apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/name: task-tracker
        app.kubernetes.io/component: user-service
    spec:
      containers:
        - name: user-service
          image: task-tracker-user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
