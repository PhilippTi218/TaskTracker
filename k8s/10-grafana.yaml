apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: TaskTracker
        orgId: 1
        folder: TaskTracker
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-tasktracker
  namespace: task-tracker
  labels:
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
data:
  tasktracker-observability.json: |
    {
      "id": null,
      "uid": "tasktracker-observability-k8s",
      "title": "TaskTracker Observability - Kubernetes",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "panels": [
        {
          "type": "stat",
          "title": "Services Up",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(up{job=~\"task-service|user-service\"})", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "Request Rate by Service",
          "gridPos": {"x": 6, "y": 0, "w": 9, "h": 8},
          "targets": [{"expr": "sum by (job) (rate(flask_http_request_total[1m]))", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "Error Rate by Service",
          "gridPos": {"x": 15, "y": 0, "w": 9, "h": 8},
          "targets": [{"expr": "sum by (job) (rate(flask_http_request_total{status=~\"5..\"}[1m]))", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "Average Response Time",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "rate(flask_http_request_duration_seconds_sum[1m]) / rate(flask_http_request_duration_seconds_count[1m])", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Tasks Created",
          "gridPos": {"x": 12, "y": 8, "w": 6, "h": 4},
          "targets": [{"expr": "sum(tasktracker_tasks_created_total)", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Users Created",
          "gridPos": {"x": 18, "y": 8, "w": 6, "h": 4},
          "targets": [{"expr": "sum(tasktracker_users_created_total)", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Tasks Updated",
          "gridPos": {"x": 12, "y": 12, "w": 6, "h": 4},
          "targets": [{"expr": "sum(tasktracker_tasks_updated_total)", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Tasks Deleted",
          "gridPos": {"x": 18, "y": 12, "w": 6, "h": 4},
          "targets": [{"expr": "sum(tasktracker_tasks_deleted_total)", "refId": "A"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: task-tracker
  labels:
    app: grafana
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: task-tracker
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-tasktracker
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-tasktracker
          configMap:
            name: grafana-dashboard-tasktracker
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: task-tracker
  labels:
    app: grafana
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
