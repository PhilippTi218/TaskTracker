apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: task-tracker
  labels:
    app: kube-state-metrics
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
---
apiVersion: ClusterRole
kind: ClusterRole
metadata:
  name: tasktracker-kube-state-metrics
  labels:
    app: kube-state-metrics
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - nodes
      - pods
      - services
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["list", "watch"]
---
apiVersion: ClusterRoleBinding
kind: ClusterRoleBinding
metadata:
  name: tasktracker-kube-state-metrics
  labels:
    app: kube-state-metrics
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tasktracker-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: task-tracker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: task-tracker
  labels:
    app: kube-state-metrics
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
        app.kubernetes.io/name: task-tracker
        app.kubernetes.io/component: monitoring
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: task-tracker
  labels:
    app: kube-state-metrics
    app.kubernetes.io/name: task-tracker
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: kube-state-metrics
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
